<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Connexion — Agora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/forum.css" />
</head>
<body>
  <main class="wrap">
    <section class="panel card">
      <h1>Connexion</h1>
      <p class="meta">Accédez à votre compte pour publier et voter.</p>
      <form class="form" id="loginForm" novalidate>
        <div>
          <label class="lbl" for="lEmail">Email</label>
          <input class="field" id="lEmail" name="email" type="email" autocomplete="email" required />
        </div>
        <div>
          <label class="lbl" for="lPass">Mot de passe</label>
          <input class="field" id="lPass" name="password" type="password" autocomplete="current-password" required />
        </div>
        <button class="btn" type="submit">Se connecter</button>
      </form>
      <p class="alt">Pas de compte ? <a href="register.html">Créer un compte</a></p>
    </section>
  </main>
  <script type="module" src="js/page-auth.js"></script>
</body>
</html>
